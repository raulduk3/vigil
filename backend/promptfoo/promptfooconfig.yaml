description: "Vigil Agent Prompt Evaluation Suite — Email Triage + Scheduled Tick"

# ---------------------------------------------------------------------------
# Model matrix — evaluate all models in use or under consideration
# ---------------------------------------------------------------------------
providers:
  - id: "file://providers/vigil-provider.ts"
    config:
      model: "gpt-4.1-nano"
    label: "gpt-4.1-nano"

  - id: "file://providers/vigil-provider.ts"
    config:
      model: "gpt-4.1-mini"
    label: "gpt-4.1-mini"

  - id: "file://providers/vigil-provider.ts"
    config:
      model: "gpt-4.1"
    label: "gpt-4.1"

  # Uncomment when API keys are available:
  # - id: "file://providers/vigil-provider.ts"
  #   config:
  #     model: "claude-haiku-4"
  #   label: "claude-haiku-4"

  # - id: "file://providers/vigil-provider.ts"
  #   config:
  #     model: "gemini-2.5-flash"
  #   label: "gemini-2.5-flash"

# ---------------------------------------------------------------------------
# Prompt — a dummy passthrough; the provider builds real prompts from vars
# ---------------------------------------------------------------------------
prompts:
  - "{{trigger_type}}"

# ---------------------------------------------------------------------------
# Test datasets (inline assertions — file:// assertions break in ESM context)
# ---------------------------------------------------------------------------
tests:
  - file://datasets/emails-inline.json
  - file://datasets/threads-inline.json

# ---------------------------------------------------------------------------
# Output settings
# ---------------------------------------------------------------------------
outputPath: "results/eval-results.json"
