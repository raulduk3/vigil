# Cloudflare Worker Configuration for Vigil Email Ingestion
# Deploy with: wrangler deploy

name = "vigil-email-ingest"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Email routing configuration
# This worker receives emails from Cloudflare Email Routing
# and forwards them to the Vigil backend

[vars]
VIGIL_API_URL = "https://api.vigil.run"
