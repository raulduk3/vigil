<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup">
        <div class="header">
            <div class="logo">Vigil</div>
            <div class="tagline">Email Intelligence</div>
        </div>

        <!-- Not authenticated -->
        <div id="auth-section" class="section">
            <p class="desc">Connect your Vigil account to set up email forwarding.</p>
            
            <div class="auth-tabs">
                <button class="tab active" data-tab="apikey">API Key</button>
                <button class="tab" data-tab="login">Email</button>
            </div>

            <div id="tab-apikey" class="tab-content active">
                <input type="text" id="api-key" placeholder="vk_your_api_key" spellcheck="false">
                <button id="btn-apikey" class="btn primary">Connect</button>
            </div>

            <div id="tab-login" class="tab-content">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Password">
                <button id="btn-login" class="btn primary">Sign In</button>
            </div>

            <p class="help">Get your API key at <a href="https://vigil.run/account/developer" target="_blank" rel="noopener noreferrer">vigil.run</a></p>
            <div id="auth-error" class="error hidden"></div>
        </div>

        <!-- Authenticated -->
        <div id="connected-section" class="section hidden">
            <div class="status-badge connected">
                <span class="dot"></span> Connected
            </div>
            <p id="active-context" class="desc">Open Gmail or Outlook, then continue in the setup panel.</p>
            <button id="btn-setup" class="btn primary">Open Setup Wizard</button>
            <div class="quick-actions">
                <button id="btn-open-gmail" class="btn secondary">Open Gmail</button>
                <button id="btn-open-outlook" class="btn secondary">Open Outlook</button>
            </div>
            <a class="help-link" href="../getting-started.html" target="_blank" rel="noopener noreferrer">Install guide</a>
            <button id="btn-logout" class="btn secondary">Disconnect</button>
        </div>
    </div>

    <script src="../lib/api.js"></script>
    <script src="popup.js"></script>
</body>
</html>
