<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="panel.css">
</head>
<body>
    <div class="panel">
        <div class="panel-header">
            <div class="header-row">
                <div class="logo">Vigil</div>
                <div id="header-controls" class="header-controls hidden">
                    <select id="watcher-select" class="watcher-dropdown"></select>
                </div>
            </div>
            <div id="nav-tabs" class="nav-tabs hidden">
                <button class="nav-tab active" data-view="overview">Overview</button>
                <button class="nav-tab" data-view="threads">Threads</button>
                <button class="nav-tab" data-view="chat">Chat</button>
                <button class="nav-tab" data-view="config">Config</button>
            </div>
        </div>

        <!-- Auth -->
        <div class="view active" id="view-auth">
            <div class="auth-form">
                <h2>Sign in to Vigil</h2>
                <p class="muted">Enter your API key or email to connect.</p>
                <input type="text" id="auth-apikey" placeholder="vk_your_api_key" spellcheck="false">
                <button id="btn-auth-apikey" class="btn primary w-full">Connect with API key</button>
                <div class="divider"><span>or</span></div>
                <input type="email" id="auth-email" placeholder="Email">
                <input type="password" id="auth-password" placeholder="Password">
                <button id="btn-auth-login" class="btn primary w-full">Sign in</button>
                <p class="muted small">No account? <a href="https://vigil.run/auth/register" target="_blank">Sign up at vigil.run</a></p>
                <div id="auth-error" class="error hidden"></div>
            </div>
        </div>

        <!-- Overview -->
        <div class="view" id="view-overview"><div id="overview-content" class="scroll-content"><div class="loading">Loading...</div></div></div>

        <!-- Threads -->
        <div class="view" id="view-threads"><div id="threads-content" class="scroll-content"><div class="loading">Loading...</div></div></div>

        <!-- Chat -->
        <div class="view" id="view-chat">
            <div id="chat-messages" class="chat-messages"></div>
            <div class="chat-bar">
                <textarea id="chat-input" rows="1" placeholder="Talk to your watcher..."></textarea>
                <button id="btn-chat-send" class="btn primary btn-send" disabled>Send</button>
            </div>
        </div>

        <!-- Config -->
        <div class="view" id="view-config">
            <div class="scroll-content" id="config-content">
                <div class="config-section">
                    <h3>Forwarding Address</h3>
                    <div class="copy-row">
                        <code id="config-address">loading...</code>
                        <button id="btn-copy-addr" class="btn-sm">Copy</button>
                    </div>
                </div>

                <div class="config-section">
                    <h3>Quick Setup</h3>
                    <p class="muted small">Open your email settings and add the forwarding address above.</p>
                    <div class="btn-row">
                        <button id="btn-gmail-fwd" class="btn secondary flex-1">Gmail Settings</button>
                        <button id="btn-gmail-filter" class="btn secondary flex-1">Gmail Filters</button>
                    </div>
                    <button id="btn-outlook-fwd" class="btn secondary w-full">Outlook Forwarding</button>
                    <a href="https://vigil.run/extension" target="_blank" class="link small">Full setup guide</a>
                </div>

                <div class="config-section">
                    <h3>Agent Instructions</h3>
                    <textarea id="config-prompt" rows="5" placeholder="What should this watcher focus on?"></textarea>
                </div>

                <div class="config-section">
                    <h3>Model</h3>
                    <select id="config-model" class="w-full">
                        <option value="gpt-4.1-mini">GPT-4.1 Mini — $0.40/$1.60 per M tokens</option>
                        <option value="gpt-4.1-nano">GPT-4.1 Nano — $0.10/$0.40 per M tokens</option>
                        <option value="gpt-4.1">GPT-4.1 — $3.00/$12.00 per M tokens</option>
                        <option value="gpt-4o">GPT-4o — $2.50/$10.00 per M tokens</option>
                        <option value="gpt-4o-mini">GPT-4o Mini — $0.15/$0.60 per M tokens</option>
                    </select>
                </div>

                <button id="btn-save-config" class="btn primary w-full">Save changes</button>
                <div id="config-status" class="hidden"></div>

                <div class="config-section" style="margin-top:24px;padding-top:16px;border-top:1px solid #e4e4e1;">
                    <button id="btn-logout" class="btn secondary w-full" style="color:#8b4242;">Disconnect</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../lib/api.js"></script>
    <script src="panel.js"></script>
</body>
</html>
